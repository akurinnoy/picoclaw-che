# ttyd web terminal editor definition.
#
# Follows the che-code pattern:
#   1. preStart init container copies the ttyd binary into a shared volume
#   2. container-contribution merges the volume mount into the devfile's
#      first container
# The container startup script launches ttyd from /ttyd-vol/ttyd.

inline:
  schemaVersion: 2.1.0
  metadata:
    name: ttyd-editor
  commands:
    - id: init-ttyd-command
      apply:
        component: ttyd-injector
  events:
    preStart:
      - init-ttyd-command
  components:
    - name: ttyd-injector
      container:
        image: docker.io/tsl0922/ttyd:1.7.7-alpine
        command:
          - sh
          - -c
          - cp /usr/bin/ttyd /ttyd-vol/ttyd && chmod +x /ttyd-vol/ttyd
        volumeMounts:
          - name: ttyd-volume
            path: /ttyd-vol
        memoryLimit: 64Mi
        memoryRequest: 16Mi
        cpuLimit: 500m
        cpuRequest: 30m
    - name: ttyd-runtime
      attributes:
        controller.devfile.io/container-contribution: true
      container:
        image: docker.io/tsl0922/ttyd:1.7.7-alpine
        memoryLimit: 128Mi
        memoryRequest: 32Mi
        cpuLimit: 500m
        cpuRequest: 30m
        endpoints:
          - name: ttyd-terminal
            targetPort: 7681
            exposure: public
            protocol: https
            attributes:
              cookiesAuthEnabled: true
              discoverable: false
              urlRewriteSupported: true
        volumeMounts:
          - name: ttyd-volume
            path: /ttyd-vol
    - name: ttyd-volume
      volume:
        ephemeral: true
